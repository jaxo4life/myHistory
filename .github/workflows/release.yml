name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package Chrome MV3 zip
        run: |
          cd .output/chrome-mv3
          zip -r "../../myHistory-${GITHUB_REF_NAME}-chrome.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: myHistory-${{ github.ref_name }}-chrome.zip
          name: ${{ github.ref_name }}
          generate_release_notes: true
